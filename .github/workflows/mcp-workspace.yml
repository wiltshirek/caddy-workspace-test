name: MCP workspace (PR agent)

on:
  workflow_dispatch:
    inputs:
      task_context:
        description: "YAML task spec for the agent"
        required: true
        type: string
      job_token:
        description: "Single-use platform token — exchanges for LLM API key"
        required: true
        type: string
      platform_url:
        description: "Platform base URL for secrets fetch"
        required: false
        type: string
        default: "https://tool.apifunnel.ai"
      agent:
        description: "Agent CLI to use (claude or gemini)"
        required: false
        type: string
        default: "claude"

permissions:
  contents: write
  pull-requests: write

jobs:
  agent:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Fetch platform secrets
        id: secrets
        run: |
          REPO="${{ github.repository }}"
          TOKEN="${{ inputs.job_token }}"
          BASE_URL="${{ inputs.platform_url }}"
          RESPONSE=$(curl -sf "$BASE_URL/api/v1/workspace/job-secrets?token=$TOKEN&repo=$REPO")
          if [ $? -ne 0 ]; then
            echo "❌ Failed to fetch platform secrets — check job_token and platform_url"
            exit 1
          fi
          API_KEY=$(echo "$RESPONSE" | python3 -c "import sys,json; print(json.load(sys.stdin)['ANTHROPIC_API_KEY'])")
          echo "::add-mask::$API_KEY"
          echo "ANTHROPIC_API_KEY=$API_KEY" >> $GITHUB_ENV

      - name: Build dev image
        run: docker build -f Dockerfile.dev -t ws-dev .

      - name: Layer agent CLI
        run: |
          AGENT="${{ inputs.agent }}"
          if [ "$AGENT" = "gemini" ]; then
            INSTALL="npm install -g @google/gemini-cli"
          else
            INSTALL="npm install -g @anthropic-ai/claude-code"
          fi
          cat > /tmp/Dockerfile.agent <<AGENTEOF
          FROM ws-dev
          USER root
          RUN command -v node >/dev/null 2>&1 || \
              (apt-get update -qq && apt-get install -y -qq nodejs npm > /dev/null 2>&1) ; \
              $INSTALL
          RUN command -v gh >/dev/null 2>&1 || \
              (apt-get update -qq && apt-get install -y -qq gh > /dev/null 2>&1) || true
          RUN useradd -m -s /bin/bash agent && mkdir -p /workspace && chown -R agent:agent /workspace
          USER agent
          AGENTEOF
          docker build -f /tmp/Dockerfile.agent -t ws-agent /tmp

      - name: Write task context
        run: |
          mkdir -p /tmp/ws-task/.task
          cat > /tmp/ws-task/.task/context.yaml <<'CTXEOF'
          ${{ inputs.task_context }}
          CTXEOF

      - name: Run agent
        run: |
          AGENT="${{ inputs.agent }}"
          if [ "$AGENT" = "gemini" ]; then
            CMD="gemini"
          else
            CMD="claude --dangerously-skip-permissions --output-format stream-json --verbose -p"
          fi
          export TASK=$(cat /tmp/ws-task/.task/context.yaml)
          docker run --rm \
            --memory 4g --pids-limit 512 \
            -w /workspace \
            -e GITHUB_TOKEN="${{ secrets.GITHUB_TOKEN }}" \
            -e GH_TOKEN="${{ secrets.GITHUB_TOKEN }}" \
            -e ANTHROPIC_API_KEY="$ANTHROPIC_API_KEY" \
            -e TASK \
            ws-agent \
            sh -c "$CMD \"\$TASK\"" | python3 -u - <<'PYEOF'
          import sys, json

          def fmt(line):
              line = line.strip()
              if not line:
                  return
              try:
                  e = json.loads(line)
              except Exception:
                  print(line, flush=True)
                  return

              t = e.get("type")
              sub = e.get("subtype", "")

              if t == "system" and sub == "init":
                  print(f"\n🤖 Agent: {e.get('model')} v{e.get('claude_code_version')}  |  mode: {e.get('permissionMode')}\n", flush=True)

              elif t == "system" and sub == "task_progress":
                  tool = e.get("last_tool_name", "")
                  desc = e.get("description", "")
                  tok = e.get("usage", {}).get("total_tokens", 0)
                  print(f"  ⚙️  [{tool}] {desc}  ({tok:,} tokens)", flush=True)

              elif t == "assistant":
                  for c in e.get("message", {}).get("content", []):
                      if c.get("type") == "tool_use":
                          name = c["name"]
                          inp = c.get("input", {})
                          if name == "Bash":
                              print(f"  🔧 Bash: {inp.get('description', inp.get('command','')[:80])}", flush=True)
                          elif name == "Edit":
                              print(f"  ✏️  Edit: {inp.get('file_path','')}", flush=True)
                          elif name == "Write":
                              print(f"  📝 Write: {inp.get('file_path','')}", flush=True)
                          elif name == "Agent":
                              print(f"\n  🔍 SubAgent: {inp.get('description','')}", flush=True)
                      elif c.get("type") == "text":
                          txt = c.get("text", "").strip()
                          if txt:
                              print(f"\n💬 {txt}\n", flush=True)

              elif t == "result":
                  ok = not e.get("is_error")
                  turns = e.get("num_turns", "?")
                  dur = e.get("duration_ms", 0) / 1000
                  cost = e.get("total_cost_usd", 0)
                  status = "✅ SUCCESS" if ok else "❌ FAILED"
                  print(f"\n{'='*60}", flush=True)
                  print(f"{status}  |  {turns} turns  |  {dur:.1f}s  |  ${cost:.4f}", flush=True)
                  print(f"{'='*60}", flush=True)
                  result_text = e.get("result", "")
                  if result_text:
                      print(f"\n{result_text}\n", flush=True)

          for line in sys.stdin:
              fmt(line)
          PYEOF
