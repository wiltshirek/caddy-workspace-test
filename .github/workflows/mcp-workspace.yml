name: MCP workspace (PR agent)

on:
  workflow_dispatch:
    inputs:
      task_context:
        description: "Task for the agent"
        required: true
        type: string
      job_token:
        description: "Single-use platform token — exchanges for LLM API key"
        required: true
        type: string
      platform_url:
        description: "Platform base URL for secrets fetch"
        required: false
        type: string
        default: "https://tool.apifunnel.ai"
      target_branch:
        description: "Base branch the PR bot should branch from"
        required: true
        type: string

permissions:
  contents: write
  pull-requests: write

jobs:
  agent:
    runs-on: ubuntu-latest
    steps:

      - uses: actions/checkout@v6
        with:
          ref: ${{ inputs.target_branch }}
          fetch-depth: 0

      - name: Setup agent
        run: |
          REPO="${{ github.repository }}"
          TOKEN="${{ inputs.job_token }}"
          BASE_URL="${{ inputs.platform_url }}"

          RESPONSE=$(curl -sf "$BASE_URL/api/v1/workspace/job-secrets?token=$TOKEN&repo=$REPO")
          if [ $? -ne 0 ]; then
            echo "::error::Failed to fetch platform secrets"
            exit 1
          fi
          API_KEY=$(echo "$RESPONSE" | python3 -c "import sys,json; print(json.load(sys.stdin)['ANTHROPIC_API_KEY'])")
          echo "::add-mask::$API_KEY"
          echo "ANTHROPIC_API_KEY=$API_KEY" >> $GITHUB_ENV

          npm install -g @anthropic-ai/claude-code

      - name: Strip git credentials
        run: |
          git config --unset-all http.https://github.com/.extraheader || true
          git config --unset credential.helper || true
          git remote set-url origin https://github.com/${{ github.repository }}.git
          sudo mv /usr/bin/gh /usr/bin/.gh-disabled
          if git push --dry-run 2>/dev/null; then
            echo "::error::Credential stripping failed — git push still works"
            exit 1
          fi
          echo "Git credentials stripped. gh CLI disabled. Agent cannot push."

      - name: Inject agent instructions
        run: |
          echo '' | base64 -d > CLAUDE.md
          echo '' | base64 -d > .workspace-mcp-server.py
          echo 'ewogICJtY3BTZXJ2ZXJzIjogewogICAgIndvcmtzcGFjZSI6IHsKICAgICAgInR5cGUiOiAic3RkaW8iLAogICAgICAiY29tbWFuZCI6ICJweXRob24zIiwKICAgICAgImFyZ3MiOiBbIi53b3Jrc3BhY2UtbWNwLXNlcnZlci5weSJdCiAgICB9CiAgfQp9Cg==' | base64 -d > .mcp.json

      - name: Run agent
        timeout-minutes: 10
        env:
          TASK: ${{ inputs.task_context }}
          GITHUB_TOKEN: ""
          GH_TOKEN: ""
        run: |
          claude --dangerously-skip-permissions --output-format stream-json --verbose -p "$TASK"

      - name: Create draft PR
        if: always()
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          if [ ! -f .agent-result.json ]; then
            echo "::warning::Agent did not produce .agent-result.json — no PR created"
            exit 0
          fi

          TITLE=$(python3 -c "import json; print(json.load(open('.agent-result.json'))['title'])")
          SUMMARY=$(python3 -c "import json; print(json.load(open('.agent-result.json'))['summary'])")
          BRANCH=$(python3 -c "import json; print(json.load(open('.agent-result.json'))['branch_name'])")
          BASE="${{ inputs.target_branch }}"

          if echo "$BRANCH" | grep -qE '^(main|master|develop|staging|production)$'; then
            echo "::error::Agent tried to use protected branch name: $BRANCH"
            exit 1
          fi

          sudo mv /usr/bin/.gh-disabled /usr/bin/gh
          git config http.https://github.com/.extraheader             "AUTHORIZATION: basic $(echo -n "x-access-token:${{ github.token }}" | base64)"

          rm -f CLAUDE.md .workspace-mcp-server.py .mcp.json .agent-result.json

          if git diff --quiet && git diff --cached --quiet; then
            echo "::warning::No file changes detected — no PR created"
            exit 0
          fi

          git checkout -b "$BRANCH"
          git add -A
          git reset -- CLAUDE.md .workspace-mcp-server.py .mcp.json .agent-result.json 2>/dev/null || true
          git commit -m "$TITLE"
          git push origin "$BRANCH"
          gh pr create             --base "$BASE"             --title "$TITLE"             --body "$SUMMARY"             --draft
