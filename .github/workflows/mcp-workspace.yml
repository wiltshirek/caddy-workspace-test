name: MCP workspace (PR agent)

on:
  workflow_dispatch:
    inputs:
      task_context:
        description: "YAML task spec for the agent"
        required: true
        type: string
      job_token:
        description: "Single-use platform token — exchanges for LLM API key"
        required: true
        type: string
      platform_url:
        description: "Platform base URL for secrets fetch"
        required: false
        type: string
        default: "https://tool.apifunnel.ai"
      agent:
        description: "Agent CLI to use (claude or gemini)"
        required: false
        type: string
        default: "claude"

permissions:
  contents: write
  pull-requests: write

jobs:
  agent:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Fetch platform secrets
        id: secrets
        run: |
          REPO="${{ github.repository }}"
          TOKEN="${{ inputs.job_token }}"
          BASE_URL="${{ inputs.platform_url }}"
          RESPONSE=$(curl -sf "$BASE_URL/api/v1/workspace/job-secrets?token=$TOKEN&repo=$REPO")
          if [ $? -ne 0 ]; then
            echo "❌ Failed to fetch platform secrets — check job_token and platform_url"
            exit 1
          fi
          API_KEY=$(echo "$RESPONSE" | python3 -c "import sys,json; print(json.load(sys.stdin)['ANTHROPIC_API_KEY'])")
          echo "::add-mask::$API_KEY"
          echo "ANTHROPIC_API_KEY=$API_KEY" >> $GITHUB_ENV

      - name: Build dev image
        run: docker build -f Dockerfile.dev -t ws-dev .

      - name: Layer agent CLI
        run: |
          AGENT="${{ inputs.agent }}"
          if [ "$AGENT" = "gemini" ]; then
            INSTALL="npm install -g @google/gemini-cli"
          else
            INSTALL="npm install -g @anthropic-ai/claude-code"
          fi
          cat > /tmp/Dockerfile.agent <<AGENTEOF
          FROM ws-dev
          USER root
          RUN command -v node >/dev/null 2>&1 || \
              (apt-get update -qq && apt-get install -y -qq nodejs npm > /dev/null 2>&1) ; \
              $INSTALL
          RUN command -v gh >/dev/null 2>&1 || \
              (apt-get update -qq && apt-get install -y -qq gh > /dev/null 2>&1) || true
          RUN useradd -m -s /bin/bash agent && mkdir -p /workspace && chown -R agent:agent /workspace
          USER agent
          AGENTEOF
          docker build -f /tmp/Dockerfile.agent -t ws-agent /tmp

      - name: Write task context
        run: |
          mkdir -p /tmp/ws-task/.task
          cat > /tmp/ws-task/.task/context.yaml <<'CTXEOF'
          ${{ inputs.task_context }}
          CTXEOF

      - name: Run agent
        run: |
          AGENT="${{ inputs.agent }}"
          if [ "$AGENT" = "gemini" ]; then
            CMD="gemini"
          else
            CMD="claude --dangerously-skip-permissions --output-format stream-json --verbose -p"
          fi
          export TASK=$(cat /tmp/ws-task/.task/context.yaml)
          docker run --rm \
            --memory 4g --pids-limit 512 \
            -w /workspace \
            -e GITHUB_TOKEN="${{ secrets.GITHUB_TOKEN }}" \
            -e GH_TOKEN="${{ secrets.GITHUB_TOKEN }}" \
            -e ANTHROPIC_API_KEY="$ANTHROPIC_API_KEY" \
            -e TASK \
            ws-agent \
            sh -c "$CMD \"\$TASK\""
